[pytest]
# ─── Test discovery ───────────────────────────────────────────────────────────
testpaths   = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Output & verbosity ───────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# ─── Markers ──────────────────────────────────────────────────────────────────
markers =
    slow: mark test as slow (deselect with -m "not slow")
    integration: mark test as integration/smoke test
